apiVersion: v1
kind: Service
metadata:
  name: identity-service-service
  namespace: identity-service
  labels:
    app.kubernetes.io/name: identity-service
spec:
  type: ClusterIP        # El Ingress (ingress.yaml) enruta el tráfico externo al Service
  selector:
    app: identity-service
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
