global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'identity-service'
    metrics_path: '/identity-service/actuator/prometheus'
    static_configs:
      - targets: ['identityservice-app:8080']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'identity-service'
